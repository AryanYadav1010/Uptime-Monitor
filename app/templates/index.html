<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uptime Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090b10;
            --card-bg: #11141d;
            --border: #1d2230;
            --text-main: #f3f4f6;
            --text-muted: #6b7280;
            --green: #10b981;
            --red: #ef4444;
            --blue: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 0 0 6px 0;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.9rem;
        }

        .status-pill {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .controls {
            margin-bottom: 24px;
        }

        button {
            font-family: 'Inter', sans-serif;
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--card-bg);
            border-color: var(--text-muted);
        }

        button:disabled {
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .domain {
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.up {
            background-color: var(--green);
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
        }

        .status-dot.down {
            background-color: var(--red);
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
        }

        .stats-row {
            display: flex;
            gap: 24px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stat-item span {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-main);
            margin-left: 4px;
        }

        .trace-footer {
            margin-top: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            border-top: 1px dashed var(--border);
            padding-top: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Uptime Monitor</h1>
                <p class="subtitle">Observability & URL latency tracking</p>
            </div>
            <div class="status-pill" id="system-status">status: checking</div>
        </header>

        <div class="controls">
            <button id="check-btn" onclick="triggerManualCheck()">Check Now</button>
        </div>

        <div class="grid" id="dashboard-grid">
            <!-- Cards loaded here -->
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const res = await fetch('/check');
                const data = await res.json();
                renderCards(data.results);
                document.getElementById('system-status').innerText = 'status: active';
            } catch (err) {
                console.error(err);
                document.getElementById('system-status').innerText = 'status: offline';
                document.getElementById('system-status').style.borderColor = 'var(--red)';
                document.getElementById('system-status').style.color = 'var(--red)';
            }
        }

        function renderCards(results) {
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = '';
            
            results.forEach(target => {
                const isUp = target.up;
                const statusClass = isUp ? 'up' : 'down';
                const cleanUrl = target.url.replace('https://', '').replace('http://', '');
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-top">
                        <span class="domain">${cleanUrl}</span>
                        <span class="status-dot ${statusClass}"></span>
                    </div>
                    <div class="stats-row">
                        <div class="stat-item">status:<span>${target.status_code || 'error'}</span></div>
                        <div class="stat-item">latency:<span>${target.latency_ms}ms</span></div>
                        <div class="stat-item">health:<span>${isUp ? 'online' : 'offline'}</span></div>
                    </div>
                    <div class="trace-footer" title="OpenTelemetry Trace ID">
                        trace_id: ${target.trace_id}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function triggerManualCheck() {
            const btn = document.getElementById('check-btn');
            btn.innerText = 'Checking...';
            btn.disabled = true;
            await fetchStatus();
            btn.innerText = 'Check Now';
            btn.disabled = false;
        }

        fetchStatus();
        setInterval(fetchStatus, 30000);
    </script>
</body>
</html>
