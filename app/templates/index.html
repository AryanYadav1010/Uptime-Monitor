<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uptime Monitor Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(22, 27, 34, 0.7);
            --border-color: rgba(240, 246, 252, 0.1);
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(45deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background-color: rgba(56, 139, 253, 0.15);
            color: #58a6ff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid rgba(56, 139, 253, 0.4);
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        button {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            background: linear-gradient(135deg, #238636, #2ea043);
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(46, 160, 67, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(46, 160, 67, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (min-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(12px);
            transition: border-color 0.3s ease, transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: rgba(56, 139, 253, 0.4);
            transform: translateY(-4px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .url-title {
            font-size: 1.25rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }

        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .indicator.up {
            background-color: var(--accent-green);
            box-shadow: 0 0 12px var(--accent-green);
            animation: pulse 2s infinite;
        }

        .indicator.down {
            background-color: var(--accent-red);
            box-shadow: 0 0 12px var(--accent-red);
            animation: pulse 2s infinite;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .metric-label {
            color: var(--text-secondary);
        }

        .metric-value {
            font-weight: 600;
        }

        .trace-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 4px 8px;
            border-radius: 4px;
            color: #8b949e;
            word-break: break-all;
            margin-top: 15px;
            display: block;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 8px rgba(63, 185, 80, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(63, 185, 80, 0);
            }
        }

        .card.down-card .indicator.down {
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 8px rgba(248, 81, 73, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(248, 81, 73, 0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Uptime Monitor</h1>
                <p style="color: var(--text-secondary); margin: 5px 0 0 0;">Real-time health, latency, & distributed tracing metrics</p>
            </div>
            <div class="status-badge" id="system-status">System: Loading...</div>
        </header>

        <div class="controls">
            <button id="check-btn" onclick="triggerManualCheck()">Check Now ⚡</button>
        </div>

        <div class="card-grid" id="dashboard-grid">
            <!-- Dynamic cards inserted here -->
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const res = await fetch('/check');
                const data = await res.json();
                renderCards(data.results);
                document.getElementById('system-status').innerText = 'System: Active';
            } catch (err) {
                console.error(err);
                document.getElementById('system-status').innerText = 'System: Offline';
                document.getElementById('system-status').style.borderColor = 'var(--accent-red)';
                document.getElementById('system-status').style.color = 'var(--accent-red)';
            }
        }

        function renderCards(results) {
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = '';
            
            results.forEach(target => {
                const isUp = target.up;
                const statusClass = isUp ? 'up' : 'down';
                const cardClass = isUp ? '' : 'down-card';
                
                const card = document.createElement('div');
                card.className = `card ${cardClass}`;
                card.innerHTML = `
                    <div class="card-header">
                        <div class="url-title" title="${target.url}">${target.url.replace('https://', '')}</div>
                        <span class="indicator ${statusClass}"></span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Status Code</span>
                        <span class="metric-value" style="color: ${isUp ? 'var(--accent-green)' : 'var(--accent-red)'}">
                            ${target.status_code || 'Timeout/Error'}
                        </span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Response Time</span>
                        <span class="metric-value">${target.latency_ms} ms</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Health</span>
                        <span class="metric-value">${isUp ? 'ONLINE' : 'OFFLINE'}</span>
                    </div>
                    <span class="trace-id" title="OTel Trace ID">Trace ID: ${target.trace_id}</span>
                `;
                grid.appendChild(card);
            });
        }

        async function triggerManualCheck() {
            const btn = document.getElementById('check-btn');
            btn.innerText = 'Checking...';
            btn.disabled = true;
            await fetchStatus();
            btn.innerText = 'Check Now ⚡';
            btn.disabled = false;
        }

        // Run fetch on load and setup interval
        fetchStatus();
        setInterval(fetchStatus, 30000);
    </script>
</body>
</html>
